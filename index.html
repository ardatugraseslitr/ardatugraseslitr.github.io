<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Kültür</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Genel Arka Plan ve Düzen */
        body {
            background-color: #1c1c1c; /* Koyu gri/siyah arka plan */
            color: #ffffff;
            font-family: 'Quicksand', 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Üst Menü (Turkuaz Şerit) */
        .custom-header {
            background-color: #008B8B; /* Görseldeki turkuaz tonu */
            padding: 15px 50px;
            display: flex;
            align-items: baseline;
        }
        .logo-ats {
            font-size: 3rem;
            font-weight: 600;
            color: #ffffff !important;
            text-decoration: none;
            margin-right: 20px;
            text-transform: uppercase;
        }
        .header-title {
            font-size: 1.5rem;
            color: #ffffff;
        }

        /* Slider (Carousel) Alanı */
        .carousel-container {
            margin: 60px auto;
            max-width: 900px;
        }
        .carousel-inner {
            background-color: #ffffff;
            color: #000000;
            height: 300px; /* Görseldeki geniş beyaz alan */
        }
        .carousel-item.active, .carousel-item {
            height: 100%;
        }
        .slider-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
            padding: 0 80px;
        }
        
        /* Oklar ve Noktalar */
        .carousel-control-prev-icon,
        .carousel-control-next-icon {
            filter: invert(1) grayscale(100); /* Beyaz okları siyah yapar */
            width: 3rem;
            height: 3rem;
        }
        .carousel-indicators {
            bottom: -50px; /* Noktaları beyaz alanın altına iter */
        }
        .carousel-indicators [data-bs-target] {
            background-color: #ffffff;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin: 0 6px;
        }

        /* Alt Bilgi */
        .custom-footer {
            margin-top: auto;
            border-top: 2px solid #ffffff;
            padding: 15px 50px;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header class="custom-header">
        <a href="index.html" class="logo-ats">ATS</a>
        <span class="header-title">Kültür</span>
    </header>

    <main class="container carousel-container">
        <div id="makaleSlider" class="carousel slide" data-bs-ride="carousel">
            
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="slider-content">
                        <h5>Son yazdığım makalelerin tanıtımı burda görülecek</h5>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="slider-content">
                        <h5>Ahilik ve Paylaşım Kültürü Üzerine Notlar</h5>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="slider-content">
                        <h5>Açık Kaynak Toplum İnşası</h5>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev" type="button" data-bs-target="#makaleSlider" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Önceki</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#makaleSlider" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Sonraki</span>
            </button>

            <div class="carousel-indicators">
                <button type="button" data-bs-target="#makaleSlider" data-bs-slide-to="0" class="active" aria-current="true"></button>
                <button type="button" data-bs-target="#makaleSlider" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#makaleSlider" data-bs-slide-to="2"></button>
            </div>
        </div>
    </main>

    <footer class="custom-footer">
        # sayfa sonu
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
